version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps):"
    target-branch: "main"
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps):"
    target-branch: "main"
  - package-ecosystem: "bundler"
    directory: "/docs"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps):"
    target-branch: "main"
