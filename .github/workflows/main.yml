name: Test

permissions:
  contents: read

on:
  push:
    branches:
      - 'main'

concurrency:
  group: ${{ format('{0}-{1}', github.workflow, github.ref) }}
  cancel-in-progress: false

jobs:
  test:
    name: Run unit tests
    strategy:
      matrix:
        os: [ ubuntu-latest, windows-latest ]
        java: [ 25 ]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Common Setup
        uses: ./.github/actions/common-setup
        with:
          java-version: ${{ matrix.java }}

      - name: Build with Gradle
        run: ./gradlew -Pver=${{ github.ref_name }} build --info

      - name: Upload build results
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.os }} Java ${{ matrix.java }} build results
          path: ${{ github.workspace }}/build/libs/

      - name: Upload test results
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.os }} Java ${{ matrix.java }} test results
          path: ${{ github.workspace }}/build/reports/

  notify:
    name: Send job complete notification
    runs-on: ubuntu-latest
    needs:
      - test
    if: always() && vars.DISCORD_WEBHOOK_ID
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Common Setup
        uses: ./.github/actions/common-setup

      - name: Retrieve Project Name
        run: echo "PROJECT_NAME=$(${{github.workspace}}/gradlew -q printProjectName)" >> $GITHUB_ENV

      - name: Notify on success
        if: success()
        uses: appleboy/discord-action@v1.2.0
        with:
          webhook_id: ${{ vars.DISCORD_WEBHOOK_ID }}
          webhook_token: ${{ secrets.DISCORD_WEBHOOK_TOKEN }}
          color: "#00FF00"
          username: "${{ env.PROJECT_NAME }} Release Bot"
          message: >
            ${{ env.PROJECT_NAME }} build on main succeeded (${{ github.actor }}):
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Notify on failure
        if: failure()
        uses: appleboy/discord-action@v1.2.0
        with:
          webhook_id: ${{ vars.DISCORD_WEBHOOK_ID }}
          webhook_token: ${{ secrets.DISCORD_WEBHOOK_TOKEN }}
          color: "#FF0000"
          username: "${{ env.PROJECT_NAME }} Release Bot"
          message: >
            ${{ env.PROJECT_NAME }} build on main failed (${{ github.actor }}):
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
